<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NIILM AI Assistant</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body
    class="overflow-hidden bg-[#f4f7ff] dark:bg-[#020617] transition-all duration-300"
  >
    <!-- Background Glow -->
    <div
      class="fixed top-[-180px] left-[-120px] w-[260px] sm:w-[400px] h-[260px] sm:h-[400px] bg-indigo-500/20 blur-[100px] rounded-full pointer-events-none"
    ></div>

    <div
      class="fixed bottom-[-200px] right-[-120px] w-[260px] sm:w-[400px] h-[260px] sm:h-[400px] bg-pink-500/20 blur-[100px] rounded-full pointer-events-none"
    ></div>

    <!-- APP -->
    <section class="relative z-10 h-screen p-2 sm:p-4">
      <div
        class="w-full h-full max-w-7xl mx-auto rounded-[24px] sm:rounded-[36px] border border-white/20 dark:border-slate-800 bg-white/70 dark:bg-slate-900/60 backdrop-blur-2xl shadow-[0_20px_80px_rgba(0,0,0,0.15)] overflow-hidden flex flex-col"
      >
        <!-- TOP BAR -->
        <nav
          class="px-3 sm:px-6 py-3 sm:py-5 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/40 dark:bg-slate-900/30 backdrop-blur-xl"
        >
          <!-- Left -->
          <div class="flex items-center gap-2 sm:gap-4 min-w-0">
            <!-- Logo -->
            <div
              class="relative min-w-[48px] w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center shadow-xl"
            >
              <div
                class="absolute inset-0 rounded-2xl bg-white/20 backdrop-blur-sm"
              ></div>

              <i
                class="fas fa-graduation-cap text-white text-base sm:text-xl z-10"
              ></i>
            </div>

            <!-- Text -->
            <div class="min-w-0">
              <h1
                class="text-lg sm:text-2xl font-bold tracking-tight text-slate-800 dark:text-white truncate"
              >
                NIILM AI
              </h1>

              <p
                class="text-[11px] sm:text-sm text-slate-500 dark:text-slate-400 truncate"
              >
                Smart University Assistant
              </p>
            </div>
          </div>

          <!-- Right -->
          <div class="flex items-center gap-2 sm:gap-3">
            <!-- Clear Chat -->
            <button
              onclick="clearHistory()"
              class="px-3 sm:px-4 h-10 sm:h-11 rounded-xl sm:rounded-2xl bg-red-500/10 dark:bg-red-500/20 border border-red-500/20 text-red-500 hover:scale-105 transition-all duration-200 flex items-center gap-2 shrink-0"
            >
              <i class="fas fa-trash text-sm"></i>

              <span class="hidden lg:block text-sm font-medium"> Clear </span>
            </button>

            <!-- Theme -->
            <button
              onclick="toggleDark()"
              class="w-10 h-10 sm:w-11 sm:h-11 rounded-xl sm:rounded-2xl bg-slate-200 dark:bg-slate-800 flex items-center justify-center hover:scale-105 transition shrink-0"
            >
              🌙
            </button>
          </div>
        </nav>

        <!-- CHAT -->
        <main
          id="chatMessages"
          class="flex-1 overflow-y-auto px-3 sm:px-6 py-4 sm:py-6 space-y-4 sm:space-y-6"
        >
          <!-- HERO CARD -->
          <div
            class="relative overflow-hidden rounded-[20px] sm:rounded-[24px] p-4 sm:p-8 bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 text-white"
          >
            <!-- Blur -->
            <div
              class="absolute top-0 right-0 w-32 sm:w-48 h-32 sm:h-48 bg-white/10 blur-3xl rounded-full"
            ></div>

            <!-- Content -->
            <div class="relative z-10">
              <h2
                class="text-xl sm:text-2xl font-bold text-center mb-3 leading-tight"
              >
                Welcome to NIILM Assistant
              </h2>

              <p
                class="text-sm sm:text-base text-indigo-100 text-center max-w-2xl mx-auto leading-relaxed"
              >
                Ask anything related to admissions, courses, fees, eligibility,
                placements, or university details.
              </p>

              <!-- Notice -->
              <div
                class="mt-4 sm:mt-5 p-3 rounded-2xl border border-white/20 bg-white/10 backdrop-blur-md"
              >
                <p
                  class="text-xs sm:text-sm text-center text-indigo-100 font-medium leading-relaxed"
                >
                  Please enter exact course names like
                  <span class="font-bold text-white">M.Sc</span>
                  instead of
                  <span class="font-bold text-white">msc</span>
                </p>
              </div>

              <!-- Chips -->
              <div
                class="flex flex-wrap justify-center gap-2 sm:gap-3 mt-5 sm:mt-6"
              >
                <button class="quick-btn">Courses</button>

                <button class="quick-btn">Admission</button>

                <button class="quick-btn">Fees</button>

                <button class="quick-btn">Contact</button>

                <button class="quick-btn">MBA</button>

                <button class="quick-btn">BCA</button>
              </div>
            </div>
          </div>
        </main>

        <!-- INPUT -->
        <footer
          class="p-3 sm:p-5 border-t border-slate-200 dark:border-slate-800 bg-white/40 dark:bg-slate-900/30 backdrop-blur-xl"
        >
          <div
            class="flex items-center gap-2 sm:gap-3 rounded-[22px] sm:rounded-[28px] border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 sm:px-5 py-3 sm:py-4 shadow-lg"
          >
            <!-- Input -->
            <input
              id="messageInput"
              type="text"
              placeholder="Ask about MBA, BCA, fees..."
              class="flex-1 min-w-0 bg-transparent outline-none text-sm sm:text-[15px] text-slate-700 dark:text-white placeholder:text-slate-400"
            />

            <!-- Stop -->
            <button
              id="stopBtn"
              class="hidden w-10 h-10 sm:w-12 sm:h-12 rounded-xl sm:rounded-2xl bg-red-500 text-white flex items-center justify-center hover:scale-105 transition shrink-0"
            >
              <i class="fas fa-stop text-sm"></i>
            </button>

            <!-- Send -->
            <button
              id="sendBtn"
              class="w-11 h-11 sm:w-14 sm:h-14 rounded-xl sm:rounded-2xl bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 text-white shadow-xl flex items-center justify-center hover:scale-105 transition shrink-0"
            >
              <i class="fas fa-paper-plane text-sm sm:text-lg"></i>
            </button>
          </div>
        </footer>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
