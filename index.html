<body
  class="h-[100dvh] overflow-hidden bg-[#f4f7ff] dark:bg-[#020617] transition-all duration-300"
>
  <!-- Background Glow -->
  <div
    class="fixed top-[-180px] left-[-120px] w-[260px] sm:w-[400px] h-[260px] sm:h-[400px] bg-indigo-500/20 blur-[100px] rounded-full pointer-events-none"
  ></div>

  <div
    class="fixed bottom-[-200px] right-[-120px] w-[260px] sm:w-[400px] h-[260px] sm:h-[400px] bg-pink-500/20 blur-[100px] rounded-full pointer-events-none"
  ></div>

  <!-- APP -->
  <section class="relative z-10 h-[100dvh] p-2 sm:p-4">
    <div
      class="w-full h-full max-w-7xl mx-auto rounded-[24px] sm:rounded-[36px] border border-white/20 dark:border-slate-800 bg-white/70 dark:bg-slate-900/60 backdrop-blur-2xl shadow-[0_20px_80px_rgba(0,0,0,0.15)] overflow-hidden flex flex-col min-h-0"
    >
      <!-- TOP BAR -->
      <nav
        class="shrink-0 px-3 sm:px-6 py-3 sm:py-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/40 dark:bg-slate-900/30 backdrop-blur-xl"
      >
        <!-- Left -->
        <div class="flex items-center gap-2 sm:gap-4 min-w-0">
          <div
            class="relative min-w-[46px] w-11 h-11 sm:w-14 sm:h-14 rounded-2xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center shadow-xl"
          >
            <div
              class="absolute inset-0 rounded-2xl bg-white/20 backdrop-blur-sm"
            ></div>

            <i
              class="fas fa-graduation-cap text-white text-sm sm:text-xl z-10"
            ></i>
          </div>

          <div class="min-w-0">
            <h1
              class="text-base sm:text-2xl font-bold tracking-tight text-slate-800 dark:text-white truncate"
            >
              NIILM AI
            </h1>

            <p
              class="text-[10px] sm:text-sm text-slate-500 dark:text-slate-400 truncate"
            >
              Smart University Assistant
            </p>
          </div>
        </div>

        <!-- Right -->
        <div class="flex items-center gap-2 shrink-0">
          <!-- Clear -->
          <button
            onclick="clearHistory()"
            class="w-10 h-10 sm:w-auto sm:px-4 sm:h-11 rounded-xl sm:rounded-2xl bg-red-500/10 dark:bg-red-500/20 border border-red-500/20 text-red-500 hover:scale-105 transition-all duration-200 flex items-center justify-center gap-2"
          >
            <i class="fas fa-trash text-sm"></i>

            <span class="hidden lg:block text-sm font-medium"> Clear </span>
          </button>

          <!-- Theme -->
          <button
            onclick="toggleDark()"
            class="w-10 h-10 sm:w-11 sm:h-11 rounded-xl sm:rounded-2xl bg-slate-200 dark:bg-slate-800 flex items-center justify-center hover:scale-105 transition"
          >
            🌙
          </button>
        </div>
      </nav>

      <!-- CHAT -->
      <main
        id="chatMessages"
        class="flex-1 min-h-0 overflow-y-auto overflow-x-hidden px-3 sm:px-6 py-4 space-y-4"
      >
        <!-- HERO -->
        <div
          class="relative overflow-hidden rounded-[20px] sm:rounded-[24px] p-4 sm:p-7 bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 text-white"
        >
          <div
            class="absolute top-0 right-0 w-32 sm:w-48 h-32 sm:h-48 bg-white/10 blur-3xl rounded-full"
          ></div>

          <div class="relative z-10">
            <h2
              class="text-lg sm:text-2xl font-bold text-center mb-3 leading-tight"
            >
              Welcome to NIILM Assistant
            </h2>

            <p
              class="text-xs sm:text-base text-indigo-100 text-center leading-relaxed"
            >
              Ask anything related to admissions, courses, fees, eligibility,
              placements, or university details.
            </p>

            <!-- Notice -->
            <div
              class="mt-4 p-3 rounded-2xl border border-white/20 bg-white/10 backdrop-blur-md"
            >
              <p
                class="text-[11px] sm:text-sm text-center text-indigo-100 font-medium leading-relaxed"
              >
                Please enter exact course names like
                <span class="font-bold text-white">M.Sc</span>
                instead of
                <span class="font-bold text-white">msc</span>
              </p>
            </div>

            <!-- Chips -->
            <div class="flex flex-wrap justify-center gap-2 mt-5">
              <button class="quick-btn">Courses</button>
              <button class="quick-btn">Admission</button>
              <button class="quick-btn">Fees</button>
              <button class="quick-btn">Contact</button>
              <button class="quick-btn">MBA</button>
              <button class="quick-btn">BCA</button>
            </div>
          </div>
        </div>
      </main>

      <!-- INPUT -->
      <footer
        class="shrink-0 p-2 sm:p-4 border-t border-slate-200 dark:border-slate-800 bg-white/40 dark:bg-slate-900/30 backdrop-blur-xl"
      >
        <div
          class="flex items-center gap-2 rounded-[22px] border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2 sm:px-5 sm:py-3 shadow-lg"
        >
          <!-- Input -->
          <input
            id="messageInput"
            type="text"
            placeholder="Ask about MBA, BCA..."
            class="flex-1 min-w-0 bg-transparent outline-none text-sm text-slate-700 dark:text-white placeholder:text-slate-400"
          />

          <!-- Stop -->
          <button
            id="stopBtn"
            class="hidden w-10 h-10 rounded-xl bg-red-500 text-white flex items-center justify-center hover:scale-105 transition shrink-0"
          >
            <i class="fas fa-stop text-sm"></i>
          </button>

          <!-- Send -->
          <button
            id="sendBtn"
            class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl sm:rounded-2xl bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 text-white shadow-xl flex items-center justify-center hover:scale-105 transition shrink-0"
          >
            <i class="fas fa-paper-plane text-sm"></i>
          </button>
        </div>
      </footer>
    </div>
  </section>

  <script src="script.js"></script>
</body>
